name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 빌드 + 테스트 + Clippy ────────────────────────
  check:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: gapttuk_test
          POSTGRES_USER: glovis
          POSTGRES_PASSWORD: test_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U glovis -d gapttuk_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://glovis:test_pw@localhost:5432/gapttuk_test
      JWT_SECRET: ci-test-secret-minimum-32-characters-long
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy lint
        run: cargo clippy -- -D warnings -A dead_code -A unused_imports

      - name: Build
        run: cargo build --release

      - name: Run tests
        run: cargo test

  # ── Docker 이미지 빌드 (main 브랜치만) ─────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: gapttuk-server:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
