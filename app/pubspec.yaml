name: gapttuk_app
description: "값뚝 — 한국 최저가 추적 앱"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # --- 상태관리 ---
  flutter_riverpod: ^3.0.2
  riverpod_annotation: ^3.0.2

  # --- 라우팅 ---
  go_router: ^16.0.0

  # --- HTTP ---
  dio: ^5.7.0

  # --- 모델 코드젠 ---
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # --- UI ---
  fl_chart: ^0.69.0
  cached_network_image: ^3.4.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # --- 유틸 ---
  flutter_secure_storage: ^9.2.0
  intl: ^0.19.0
  url_launcher: ^6.3.0

  # --- 소셜 로그인 ---
  kakao_flutter_sdk_user: ^1.9.0
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # --- 테스트 ---
  mocktail: ^1.0.0
  network_image_mock: ^2.1.0

  # --- 코드젠 ---
  freezed: ^3.0.0
  json_serializable: ^6.8.0
  riverpod_generator: ^3.0.0
  build_runner: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
